<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --text: #24292f;
      --text-light: #57606a;
      --bg: #ffffff;
      --code-bg: #f6f8fa;
      --border: #d0d7de;
      --link: #0969da;
      --accent: #0550ae;
      --green: #1a7f37;
      --red: #cf222e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      font-size: 16px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    h1 { font-size: 2rem; margin: 1.5rem 0 0.5rem; }
    h2 { font-size: 1.5rem; margin: 2rem 0 0.75rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }

    p { margin: 0.75rem 0; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    blockquote {
      border-left: 4px solid var(--link);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--code-bg);
      color: var(--text-light);
    }
    blockquote p { margin: 0.25rem 0; }

    code {
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    pre code { background: none; padding: 0; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    th { background: var(--code-bg); font-weight: 600; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    ol, ul { padding-left: 1.5rem; margin: 0.5rem 0; }
    li { margin: 0.35rem 0; }
    li ul, li ol { margin: 0.25rem 0; }

    details {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
    }
    details[open] { padding-bottom: 1rem; }
    summary {
      cursor: pointer;
      user-select: none;
    }
    summary:hover { color: var(--link); }
    details > *:not(summary) { margin-top: 0.5rem; }

    input[type="checkbox"] { margin-right: 0.4rem; }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.6rem; }
      h2 { font-size: 1.3rem; }
      table { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
